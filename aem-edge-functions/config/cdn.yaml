kind: 'CDN'
version: '1'
data:
  originSelectors:
    rules:
      # Route the article page to the edge function ONLY when ?articleID= is
      # present. This is also the loop guard: the function fetches the same
      # path without articleID for the shell, so that request won't match here.
      - name: route-health-encyclopedia-article-to-edge-function
        when:
          allOf:
            - reqProperty: path
              equals: "/northern-california/health-wellness/health-encyclopedia/article"
            - queryParam: articleID
              exists: true
        action:
          type: selectAemOrigin
          originName: edgefunction-kp-article
          skipCache: true
