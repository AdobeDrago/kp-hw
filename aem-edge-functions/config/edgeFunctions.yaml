kind: "EdgeFunctions"
version: "1"
data:
  functions:
    - name: kp-article
      # Restrict outbound fetches to these hosts (pair with
      # enforceExplicitBackends() in code for SSRF hardening).
      origins:
        - name: healthwise
          domain: ixbapi.healthwise.net
        - name: eds-prod
          domain: main--kp-hw--adobedrago.aem.live
        - name: eds-preview
          domain: main--kp-hw--adobedrago.aem.page
  # hw.key — secret store is NOT provisioned on sandbox programs, so the
  # secrets block is disabled for the sandbox PoC. The Healthwise key is
  # injected at build time via the local-secrets fallback in src/lib/config.js.
  # On a non-sandbox env, re-enable this (define HW_KEY_SECRET in Cloud Manager
  # first) and drop the local-secrets fallback.
  # secrets:
  #   - key: HW_KEY
  #     value: ${{HW_KEY_SECRET}}
  # Enable later to cache rendered articles at the edge (kv_default).
  # kvs: true
