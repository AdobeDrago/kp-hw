<svg xmlns="http://www.w3.org/2000/svg" width="680" height="316" viewBox="0 0 680 316" role="img" aria-labelledby="title desc">
<title id="title">How code and content reach the environments in Edge Delivery Services</title>
<desc id="desc">Developers write code and run aem up for local development, where the local server serves their code and proxies content from the preview environment. They push to Code Sync, which serves code directly with no build or deploy step, to the preview (.aem.page) and live (.aem.live) environments. Authors work in Document Authoring and feed the same two environments by previewing and publishing. Code enters the environments from the left, content from the right.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<style>
.t{font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:14px;font-weight:400}
.th{font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:14px;font-weight:500}
.ts{font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:12px;font-weight:400}
</style>
</defs>

<rect x="0.5" y="0.5" width="679" height="315" rx="12" fill="#ffffff" stroke="#E5E5E0"/>

<rect x="40" y="10" width="13" height="13" rx="3" fill="#EEEDFE" stroke="#534AB7"/><text class="ts" x="58" y="21" fill="#5F5E5A">developers</text>
<rect x="150" y="10" width="13" height="13" rx="3" fill="#E1F5EE" stroke="#0F6E56"/><text class="ts" x="168" y="21" fill="#5F5E5A">authors</text>
<rect x="248" y="10" width="13" height="13" rx="3" fill="#E6F1FB" stroke="#185FA5"/><text class="ts" x="266" y="21" fill="#5F5E5A">environments</text>
<rect x="392" y="10" width="13" height="13" rx="3" fill="#F1EFE8" stroke="#5F5E5A"/><text class="ts" x="410" y="21" fill="#5F5E5A">tooling</text>

<rect x="30" y="52" width="150" height="48" rx="6" fill="#EEEDFE" stroke="#534AB7"/><text class="th" x="105" y="74" text-anchor="middle" fill="#26215C">Developers</text><text class="ts" x="105" y="90" text-anchor="middle" fill="#534AB7">write code</text>
<rect x="30" y="132" width="150" height="48" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-dasharray="4 3"/><text class="th" x="105" y="154" text-anchor="middle" fill="#2C2C2A">Local dev</text><text class="ts" x="105" y="170" text-anchor="middle" fill="#5F5E5A">localhost:3000</text>
<rect x="30" y="212" width="150" height="48" rx="6" fill="#F1EFE8" stroke="#5F5E5A"/><text class="th" x="105" y="234" text-anchor="middle" fill="#2C2C2A">Code Sync</text><text class="ts" x="105" y="250" text-anchor="middle" fill="#5F5E5A">no build, no deploy</text>

<rect x="325" y="58" width="150" height="56" rx="6" fill="#E6F1FB" stroke="#185FA5"/><text class="th" x="400" y="83" text-anchor="middle" fill="#042C53">Preview</text><text class="ts" x="400" y="100" text-anchor="middle" fill="#185FA5">.aem.page</text>
<rect x="325" y="236" width="150" height="56" rx="6" fill="#E6F1FB" stroke="#185FA5"/><text class="th" x="400" y="261" text-anchor="middle" fill="#042C53">Live</text><text class="ts" x="400" y="278" text-anchor="middle" fill="#185FA5">.aem.live</text>

<rect x="520" y="150" width="130" height="56" rx="6" fill="#E1F5EE" stroke="#0F6E56"/><text class="th" x="585" y="175" text-anchor="middle" fill="#04342C">Authors</text><text class="ts" x="585" y="192" text-anchor="middle" fill="#0F6E56">author in DA</text>

<line x1="105" y1="100" x2="105" y2="130" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="105" y1="180" x2="105" y2="210" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="176" y1="220" x2="364" y2="115" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="180" y1="247" x2="322" y2="259" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="518" y1="162" x2="470" y2="114" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="518" y1="193" x2="470" y2="252" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="323" y1="95" x2="183" y2="153" stroke="#9A9A94" stroke-width="1.3" stroke-dasharray="5 4" marker-end="url(#arrow)"/>

<rect x="110" y="107" width="46" height="15" rx="3" fill="#ffffff"/><text class="ts" x="114" y="119" fill="#5F5E5A">aem up</text>
<rect x="110" y="187" width="50" height="15" rx="3" fill="#ffffff"/><text class="ts" x="114" y="199" fill="#5F5E5A">git push</text>
<rect x="234" y="156" width="74" height="15" rx="3" fill="#ffffff"/><text class="ts" x="271" y="168" text-anchor="middle" fill="#5F5E5A">push branch</text>
<rect x="212" y="227" width="82" height="15" rx="3" fill="#ffffff"/><text class="ts" x="253" y="239" text-anchor="middle" fill="#5F5E5A">merge to main</text>
<rect x="472" y="127" width="48" height="15" rx="3" fill="#ffffff"/><text class="ts" x="496" y="139" text-anchor="middle" fill="#5F5E5A">preview</text>
<rect x="473" y="210" width="46" height="15" rx="3" fill="#ffffff"/><text class="ts" x="496" y="222" text-anchor="middle" fill="#5F5E5A">publish</text>
<rect x="206" y="109" width="90" height="15" rx="3" fill="#ffffff"/><text class="ts" x="251" y="121" text-anchor="middle" fill="#9A9A94">proxies content</text>
</svg>
