<svg xmlns="http://www.w3.org/2000/svg" width="680" height="360" viewBox="0 0 680 360" role="img" aria-labelledby="title desc">
<title id="title">How code and content reach the environments in Edge Delivery Services</title>
<desc id="desc">Developers push code, which Code Sync serves directly with no build or deploy step: a branch reaches the preview environment (.aem.page) and merging to main reaches live (.aem.live). Authors work in Document Authoring, then preview content to .aem.page and publish it to .aem.live. When a developer runs aem up locally, the local server serves their local code and proxies content from the preview environment. Both tracks feed the same two shared environments independently.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<style>
.t{font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:14px;font-weight:400}
.th{font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:14px;font-weight:500}
.ts{font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:12px;font-weight:400}
</style>
</defs>

<rect x="0.5" y="0.5" width="679" height="359" rx="12" fill="#ffffff" stroke="#E5E5E0"/>

<rect x="40" y="10" width="13" height="13" rx="3" fill="#EEEDFE" stroke="#534AB7"/><text class="ts" x="58" y="21" fill="#5F5E5A">code · developers</text>
<rect x="210" y="10" width="13" height="13" rx="3" fill="#E1F5EE" stroke="#0F6E56"/><text class="ts" x="228" y="21" fill="#5F5E5A">content · authors</text>
<rect x="380" y="10" width="13" height="13" rx="3" fill="#F1EFE8" stroke="#5F5E5A"/><text class="ts" x="398" y="21" fill="#5F5E5A">environments</text>

<rect x="30" y="90" width="130" height="50" rx="6" fill="#EEEDFE" stroke="#534AB7"/><text class="th" x="95" y="112" text-anchor="middle" fill="#26215C">Developers</text><text class="ts" x="95" y="128" text-anchor="middle" fill="#534AB7">push code</text>
<rect x="220" y="90" width="140" height="50" rx="6" fill="#F1EFE8" stroke="#5F5E5A"/><text class="th" x="290" y="112" text-anchor="middle" fill="#2C2C2A">Code Sync</text><text class="ts" x="290" y="128" text-anchor="middle" fill="#5F5E5A">no build, no deploy</text>
<rect x="30" y="185" width="150" height="54" rx="6" fill="#F1EFE8" stroke="#5F5E5A"/><text class="th" x="105" y="209" text-anchor="middle" fill="#2C2C2A">Local dev</text><text class="ts" x="105" y="226" text-anchor="middle" fill="#5F5E5A">aem up</text>
<rect x="30" y="275" width="130" height="56" rx="6" fill="#E1F5EE" stroke="#0F6E56"/><text class="th" x="95" y="301" text-anchor="middle" fill="#04342C">Authors</text><text class="ts" x="95" y="318" text-anchor="middle" fill="#0F6E56">author in DA</text>

<rect x="490" y="96" width="150" height="58" rx="6" fill="#F1EFE8" stroke="#5F5E5A"/><text class="th" x="565" y="121" text-anchor="middle" fill="#2C2C2A">Preview</text><text class="ts" x="565" y="138" text-anchor="middle" fill="#5F5E5A">.aem.page</text>
<rect x="490" y="272" width="150" height="58" rx="6" fill="#F1EFE8" stroke="#5F5E5A"/><text class="th" x="565" y="297" text-anchor="middle" fill="#2C2C2A">Live</text><text class="ts" x="565" y="314" text-anchor="middle" fill="#5F5E5A">.aem.live</text>

<line x1="160" y1="115" x2="216" y2="115" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="360" y1="110" x2="488" y2="124" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="360" y1="122" x2="486" y2="296" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="160" y1="300" x2="487" y2="136" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="160" y1="305" x2="488" y2="300" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="95" y1="140" x2="95" y2="182" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
