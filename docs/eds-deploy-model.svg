<svg xmlns="http://www.w3.org/2000/svg" width="680" height="432" viewBox="0 0 680 432" role="img" aria-labelledby="title desc">
<title id="title">How deployment works in Edge Delivery Services</title>
<desc id="desc">Developers push code to any GitHub branch; Code Sync serves it directly with no build or deploy step. Pushing a branch deploys to its preview environment, merging to main deploys to production. Authors publish content on a separate, independent track. Both code and content converge at the live site.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<style>
.t{font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:14px;font-weight:400}
.th{font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:14px;font-weight:500}
.ts{font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:12px;font-weight:400}
</style>
</defs>

<rect x="0.5" y="0.5" width="679" height="431" rx="12" fill="#ffffff" stroke="#E5E5E0"/>

<rect x="40" y="10" width="13" height="13" rx="3" fill="#EEEDFE" stroke="#534AB7"/><text class="ts" x="58" y="21" fill="#5F5E5A">code · developers</text>
<rect x="210" y="10" width="13" height="13" rx="3" fill="#E1F5EE" stroke="#0F6E56"/><text class="ts" x="228" y="21" fill="#5F5E5A">content · authors</text>
<rect x="380" y="10" width="13" height="13" rx="3" fill="#F1EFE8" stroke="#5F5E5A"/><text class="ts" x="398" y="21" fill="#5F5E5A">infrastructure</text>

<rect x="40" y="88" width="110" height="50" rx="6" fill="#EEEDFE" stroke="#534AB7"/><text class="th" x="95" y="112" text-anchor="middle" fill="#26215C">Developers</text><text class="ts" x="95" y="128" text-anchor="middle" fill="#534AB7">push code</text>
<rect x="210" y="88" width="150" height="50" rx="6" fill="#EEEDFE" stroke="#534AB7"/><text class="th" x="285" y="112" text-anchor="middle" fill="#26215C">GitHub branch</text><text class="ts" x="285" y="128" text-anchor="middle" fill="#534AB7">any branch</text>
<rect x="430" y="88" width="150" height="50" rx="6" fill="#F1EFE8" stroke="#5F5E5A"/><text class="th" x="505" y="112" text-anchor="middle" fill="#2C2C2A">Code Sync</text><text class="ts" x="505" y="128" text-anchor="middle" fill="#5F5E5A">no build, no deploy</text>

<rect x="320" y="208" width="150" height="56" rx="6" fill="#EEEDFE" stroke="#534AB7"/><text class="th" x="395" y="234" text-anchor="middle" fill="#26215C">Feature preview</text><text class="ts" x="395" y="251" text-anchor="middle" fill="#534AB7">branch &#8594; .aem.page</text>
<rect x="490" y="208" width="150" height="56" rx="6" fill="#EEEDFE" stroke="#534AB7"/><text class="th" x="565" y="234" text-anchor="middle" fill="#26215C">Production</text><text class="ts" x="565" y="251" text-anchor="middle" fill="#534AB7">main &#8594; .aem.live</text>

<rect x="40" y="360" width="120" height="50" rx="6" fill="#E1F5EE" stroke="#0F6E56"/><text class="th" x="100" y="385" text-anchor="middle" fill="#04342C">Authors</text><text class="ts" x="100" y="401" text-anchor="middle" fill="#0F6E56">publish content</text>
<rect x="490" y="356" width="150" height="56" rx="6" fill="#F1EFE8" stroke="#5F5E5A"/><text class="th" x="565" y="382" text-anchor="middle" fill="#2C2C2A">Live site</text><text class="ts" x="565" y="399" text-anchor="middle" fill="#5F5E5A">served to visitors</text>

<line x1="150" y1="113" x2="206" y2="113" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="360" y1="113" x2="426" y2="113" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="485" y1="138" x2="402" y2="205" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="525" y1="138" x2="560" y2="205" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="565" y1="264" x2="565" y2="352" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="160" y1="385" x2="486" y2="385" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<text class="ts" x="178" y="104" text-anchor="middle" fill="#5F5E5A">git push</text>
<text class="ts" x="424" y="178" text-anchor="middle" fill="#5F5E5A">push branch</text>
<text class="ts" x="560" y="178" text-anchor="middle" fill="#5F5E5A">merge to main</text>
<text class="ts" x="315" y="377" text-anchor="middle" fill="#5F5E5A">publish (independent)</text>
<text class="ts" x="572" y="312" fill="#5F5E5A">code</text>
</svg>
